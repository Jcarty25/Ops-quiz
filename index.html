<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Ops Europe - Quiz Board 🎬</title>
  <meta name="theme-color" content="#0c0a09" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
  <link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    /* ── DARK CINEMA THEME ───────────────────────────────────── */
    :root {
      --color-text-primary:          #fafaf9;
      --color-text-secondary:        #a8a29e;
      --color-text-success:          #4ade80;
      --color-text-danger:           #fca5a5;
      --color-text-warning:          #fcd34d;
      --color-background-primary:    #292524;
      --color-background-secondary:  #1e1b18;
      --color-background-success:    #052e16;
      --color-background-danger:     #3b0f0f;
      --color-background-warning:    #1c1004;
      --color-border-primary:        #fbbf24;
      --color-border-secondary:      #44403c;
      --color-border-tertiary:       #3a3330;
      --color-border-success:        #14532d;
      --color-border-danger:         #7f1d1d;
      --color-border-warning:        #92400e;
      --border-radius-sm: 4px;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      background: #0c0a09;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(251,191,36,0.08) 0%, transparent 55%);
      font-family: var(--font-sans);
      color: var(--color-text-primary);
      -webkit-font-smoothing: antialiased;
      padding: 32px 16px 80px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    #root {
      width: 100%;
      max-width: 720px;
    }

    /* ── APP CARD ────────────────────────────────────────────── */
    .card-wrap {
      background: #141210;
      border: 1px solid #2a2521;
      border-radius: 16px;
      padding: 0 1.5rem 3rem;
      box-shadow:
        0 0 0 1px rgba(251,191,36,0.06),
        0 4px 6px rgba(0,0,0,0.4),
        0 24px 48px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    /* Header is first child — break it out to full bleed */
    .card-wrap > div:first-child {
      margin-left:  -1.5rem !important;
      margin-right: -1.5rem !important;
      border-radius: 0 !important;
      border-left: none !important;
      border-right: none !important;
    }

    /* ── LOADING ─────────────────────────────────────────────── */
    .loading {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--color-text-secondary);
      font-size: 15px;
      font-family: var(--font-sans);
    }

    /* ── INPUTS ──────────────────────────────────────────────── */
    input {
      background: #1e1b18;
      border: 1px solid #44403c;
      border-radius: var(--border-radius-md);
      padding: 11px 16px;
      font-size: 15px;
      font-family: var(--font-sans);
      color: var(--color-text-primary);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: #fbbf24;
      box-shadow: 0 0 0 3px rgba(251,191,36,0.18);
    }
    ::placeholder { color: #57534e; }

    /* ── BUTTONS ─────────────────────────────────────────────── */
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #292524;
      border: 1px solid #44403c;
      border-radius: var(--border-radius-md);
      padding: 9px 18px;
      font-size: 14px;
      font-family: var(--font-sans);
      font-weight: 500;
      color: var(--color-text-primary);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    button:hover:not(:disabled) {
      background: #3a3330;
      border-color: #57534e;
    }
    button:active:not(:disabled) { background: #44403c; }
    button:disabled { opacity: 0.28; cursor: not-allowed; }

    /* ── TYPOGRAPHY ──────────────────────────────────────────── */
    h1, h2 { margin: 0; padding: 0; line-height: 1.3; }
    p { margin: 0; padding: 0; }

    /* ── MOBILE ──────────────────────────────────────────────── */
    @media (max-width: 520px) {
      body { padding: 0; }
      #root { max-width: 100%; }
      .card-wrap {
        border-radius: 0;
        border-top: none;
        border-left: none;
        border-right: none;
        padding: 0 1rem 3rem;
      }
      .card-wrap > div:first-child {
        margin-left:  -1rem !important;
        margin-right: -1rem !important;
      }
    }
  </style>
</head>

10,team:2,pressure:8},jurassicpark:{chaos:9,drive:4,emotion:3,team:4,pressure:8},toystory:{chaos:5,drive:5,emotion:7,team:9,pressure:5},pirates:{chaos:7,drive:5,emotion:3,team:5,pressure:4},shrek:{chaos:5,drive:2,emotion:4,team:1,pressure:4},homealone:{chaos:7,drive:6,emotion:3,team:1,pressure:7},avengers:{chaos:7,drive:7,emotion:5,team:10,pressure:8},inception:{chaos:3,drive:7,emotion:2,team:5,pressure:8},darkknight:{chaos:8,drive:9,emotion:5,team:1,pressure:10},findingnemo:{chaos:7,drive:9,emotion:9,team:2,pressure:7},meangirls:{chaos:6,drive:7,emotion:2,team:7,pressure:7},bridesmaids:{chaos:8,drive:3,emotion:7,team:6,pressure:5},laland:{chaos:2,drive:9,emotion:9,team:1,pressure:5},thehangover:{chaos:10,drive:2,emotion:3,team:6,pressure:5},harrypotter:{chaos:5,drive:4,emotion:9,team:6,pressure:6},interstellar:{chaos:2,drive:9,emotion:6,team:4,pressure:10},devilwearsprada:{chaos:3,drive:7,emotion:1,team:2,pressure:10},insideout:{chaos:3,drive:2,emotion:10,team:5,pressure:3},pursuitofhappyness:{chaos:3,drive:10,emotion:9,team:1,pressure:10},legallyblonde:{chaos:5,drive:8,emotion:6,team:5,pressure:7},frozen:{chaos:4,drive:5,emotion:10,team:3,pressure:4},thesocialnetwork:{chaos:2,drive:10,emotion:2,team:2,pressure:7},topgunmaverick:{chaos:6,drive:9,emotion:5,team:7,pressure:10},goodwillhunting:{chaos:2,drive:7,emotion:7,team:3,pressure:7},eeaao:{chaos:8,drive:3,emotion:10,team:6,pressure:9}},Ph={lionking:{title:"The Lion King",year:"1994",emoji:"\u{1F981}\u{1F451}\u2728",bg:"#FAEEDA",border:"#BA7517",text:"#633806",tagline:"Somewhere this week there was a Rafiki moment \u2014 something bonked you on the head and reminded you who you are. Simba didn't feel ready either; he'd been happily living Hakuna Matata and not dealing with it. But Pride Rock needs its leader, and this week you showed up for it whether you planned to or not. You led \u2014 quietly or loudly, reluctantly or willingly \u2014 and the pride is in better shape because of it. The Circle of Life keeps turning. Go and enjoy your weekend, future king. The kingdom will hold."},matrix:{title:"The Matrix",year:"1999",emoji:"\u{1F48A}\u{1F576}\uFE0F\u{1F7E9}",bg:"#E1F5EE",border:"#1D9E75",text:"#085041",tagline:"You took the red pill this week, whether you planned to or not \u2014 and once you see the code, you can't unsee it. While others were still loading the programme, you were already reading what was behind it: spotting the pattern, asking the question nobody else thought to ask, sitting in the Oracle's kitchen wondering what it all actually means. The blue pill crowd had an easier week. But Neo never went back, and neither will you. Unplug this weekend. Step out of the simulation for a couple of days. The Matrix will still be there Monday."},forrestgump:{title:"Forrest Gump",year:"1994",emoji:"\u{1F3C3}\u200D\u2642\uFE0F\u{1F36B}\u{1F332}",bg:"#EAF3DE",border:"#639922",text:"#27500A",tagline:"'I just felt like running.' That's your week in one line. No grand strategy, no master plan \u2014 you just kept going, one foot in front of the other, and covered a remarkable amount of ground without making a fuss about any of it. Forrest didn't analyse the optimal route or wait until conditions were perfect. He just ran. Life is a box of chocolates and this week you got on with it, whatever came out of the box. Sit down on your bench this weekend. You've more than earned it."},titanic:{title:"Titanic",year:"1997",emoji:"\u{1F6A2}\u{1F499}\u{1F30A}",bg:"#E6F1FB",border:"#378ADD",text:"#0C447C",tagline:"You've been at the bow this week with your arms out \u2014 feeling every bit of it. Jack didn't half-feel things and neither did you. There were icebergs this week \u2014 things that appeared from nowhere and changed the shape of everything \u2014 and you stayed on deck rather than retreating to your first-class cabin and pretending it wasn't happening. That takes something real. The ship may have wobbled, but you were fully present for every minute of it. Draw the picture. Keep the memory warm. Go and rest now \u2014 you've held on long enough."},jurassicpark:{title:"Jurassic Park",year:"1993",emoji:"\u{1F995}\u26A1\u{1F334}",bg:"#FCEBEB",border:"#E24B4A",text:"#791F1F",tagline:"Dr. Malcolm told everyone exactly how this was going to go, and nobody listened. Then the power went out, Dennis Nedry made a terrible decision, the fences came down, and suddenly everything was happening at once in ways that were definitely not in the brochure. That was your week. The velociraptors got into the kitchen. The T-Rex was outside. You were improvising through it with whatever was to hand, and somehow you made it to the helicopter. Life, uh, finds a way. It always does. The park will still be there on Monday. Go and decompress."},toystory:{title:"Toy Story",year:"1995",emoji:"\u{1F920}\u{1F680}\u2B50",bg:"#FAECE7",border:"#D85A30",text:"#712B13",tagline:"'You've got a friend in me.' That's what this week was about. You were Woody \u2014 not the flashiest toy in the room, but the one who kept everyone from falling apart when Andy wasn't looking. You organised the rescue, kept Buzz from flying off the shelf convinced he was a real space ranger, and reminded the whole toy box that getting to the moving van matters more than who gets top billing. That kind of steady leadership often goes unspoken. So here it is: the team held together because of you. To infinity and beyond \u2014 after a proper weekend, cowboy."},pirates:{title:"Pirates of the Caribbean",year:"2003",emoji:"\u{1F3F4}\u200D\u2620\uFE0F\u2693\u{1F5FA}\uFE0F",bg:"#EEEDFE",border:"#7F77DD",text:"#3C3489",tagline:"There's a moment in every Pirates film where Jack Sparrow produces a plan so impossible, so chaotic, so completely made up on the spot, that it absolutely should not work \u2014 and then it does, just barely, in a way nobody could have predicted. That was you this week. The compass didn't point north. The ship was listing. You negotiated your way out of at least three situations with no clean exit, and you still found the rum somewhere along the way. Nobody could fully explain your method. Nobody needed to. The results speak for themselves. Sail toward the weekend, Captain."},shrek:{title:"Shrek",year:"2001",emoji:"\u{1F49A}\u{1F3F0}\u{1F33F}",bg:"#FBEAF0",border:"#D4537E",text:"#72243E",tagline:"Ogres are like onions \u2014 they have layers. You have layers. This week people got a few more of them than they usually bargain for: the unexpected move, the instinct nobody saw coming, the moment the ogre from the swamp walked in and sorted out what the perfectly-organised kingdom couldn't. Lord Farquaad had a plan, an army, and a very tidy castle \u2014 and Shrek still strolled in and handled it his own way. You didn't need the approval. You didn't need the title. You just needed your swamp and the weekend. Go home. It's yours."},homealone:{title:"Home Alone",year:"1990",emoji:"\u{1F3E0}\u{1F384}\u2744\uFE0F",bg:"#FEF3C7",border:"#D97706",text:"#92400E",tagline:"All week long, everyone else got on their flight and left you to deal with the house. No backup, no instructions, no Kevin McCallister handbook \u2014 just you, your own resources, and a surprisingly effective set of homemade solutions that nobody else would have thought of. What looked like chaos from the outside was actually a masterclass in solo improvisation. You rigged the furnace, you faced the Wet Bandits, you kept the place standing. Go enjoy your full weekend off. The house \u2014 and your dignity \u2014 are both intact."},avengers:{title:"The Avengers",year:"2012",emoji:"\u26A1\u{1F6E1}\uFE0F\u{1F4A5}",bg:"#E0E7FF",border:"#4338CA",text:"#312E81",tagline:"Nick Fury called in every favour this week. You probably didn't expect to be sharing the Quinjet with quite this many strong personalities, all with different ideas about how to handle the situation \u2014 but here you all are, somehow pulling in the same direction by Friday. That's not nothing. Getting a team of people this capable to function under this much pressure is its own kind of superpower. The Tesseract has been dealt with. The city is mostly still standing. Go and get shawarma. You've earned it."},inception:{title:"Inception",year:"2010",emoji:"\u{1F300}\u{1F4A4}\u{1F3B2}",bg:"#EEF2FF",border:"#6366F1",text:"#312E81",tagline:"You've been operating in deep layers this week \u2014 the problem behind the problem behind the actual problem. What looked like one task on the surface had three more underneath it, each one requiring a different set of skills and a different approach. You probably explained it to someone and watched their eyes glaze over around layer two. Cobb would understand. The important thing is that the job is done, the top is probably still spinning, and you can come back to reality for the weekend."},darkknight:{title:"The Dark Knight",year:"2008",emoji:"\u{1F987}\u{1F306}\u{1F3AD}",bg:"#F3F4F6",border:"#374151",text:"#111827",tagline:"Some weeks ask more of you than others. This was one of them. You did the thing nobody else was willing to do \u2014 made the call, carried the consequence, took the weight nobody was lining up to take. Batman doesn't get applause. He gets blamed, misunderstood, and left alone on a rooftop while everybody else goes home. But Gotham's still standing. Sometimes that's all the reward there is. Go and have your weekend. You've earned the night off."},findingnemo:{title:"Finding Nemo",year:"2003",emoji:"\u{1F420}\u{1F30A}\u{1F50D}",bg:"#FFEDD5",border:"#EA580C",text:"#7C2D12",tagline:"You found your Nemo this week \u2014 or rather, you refused to stop until you did. Whatever you were driving toward, you were absolutely not taking no for an answer. Marlin crossed an entire ocean, befriended a shark, got swallowed by a whale, and survived a jellyfish field. You probably did the work equivalent of at least four of those things. What matters is that you got there. P. Sherman, 42 Wallaby Way, Sydney \u2014 done. The ocean is very large and you crossed it this week. That deserves a full weekend."},meangirls:{title:"Mean Girls",year:"2004",emoji:"\u{1F485}\u{1F380}\u{1F4F1}",bg:"#FFE4E6",border:"#E11D48",text:"#881337",tagline:"You've been navigating the Plastics table this week. Not necessarily maliciously \u2014 but there has definitely been a whole political dimension to proceedings that required a level of social awareness beyond normal job requirements. Who sits where, who talks to whom, what's actually being said versus what's being communicated \u2014 you've been reading all of it in real time. On Wednesdays we wear pink, and this week required some very deliberate outfit choices. You handled the cafeteria. Go and have a weekend completely free of politics."},bridesmaids:{title:"Bridesmaids",year:"2011",emoji:"\u{1F492}\u{1F37E}\u{1F605}",bg:"#FDF4FF",border:"#A21CAF",text:"#701A75",tagline:"This week was a Melissa McCarthy-on-the-plane situation \u2014 things went wrong in spectacular, unglamorous, cannot-be-unseen ways, and yet here you are. The dress fitting happened. The hen do survived. The wedding almost fell apart twice but in the end everyone made it down the aisle and that's the benchmark. You kept it together when keeping it together was not the obvious outcome. Annie Walker would be proud. Go and eat something good. You deserve it after a week like that."},laland:{title:"La La Land",year:"2016",emoji:"\u{1F3B5}\u{1F305}\u{1F49B}",bg:"#FEFCE8",border:"#CA8A04",text:"#713F12",tagline:"You've been chasing something real this week \u2014 not just doing the job, but genuinely caring about it, putting something of yourself in. That's Mia and Sebastian's whole energy: not just grinding, but building something you actually believe in, even when the timing's bad and the path isn't clear. Some weeks are business as usual. This one meant something. Whether or not the epilogue turns out the way you planned \u2014 the dream was worth having. Go and enjoy your weekend. The spotlight will still be there Monday."},thehangover:{title:"The Hangover",year:"2009",emoji:"\u{1F0CF}\u{1F3B0}\u{1F635}",bg:"#F7F6F1",border:"#78716C",text:"#292524",tagline:"You'll piece together exactly how this week happened at some point. Probably over the weekend, lying flat, reviewing the evidence. The rooftop tiger situation will eventually make sense. Right now, all that matters is that Phil, Stu, and Alan made it back from Vegas, the groom is safe, and none of you are technically in trouble. The photos from the camera, however, tell a story. Don't delete them. You'll want to laugh about this in about six months. For now: recovery mode."},harrypotter:{title:"Harry Potter",year:"2001",emoji:"\u26A1\u{1F9D9}\u{1F3F0}",bg:"#F5F3FF",border:"#7C3AED",text:"#4C1D95",tagline:"You walked through the wall at Platform 9\xBE this week \u2014 something that looked completely impossible from the outside, but you just put your head down and ran at it. And it worked. There were trolls in the dungeon, Quidditch was more complicated than expected, and Quirrell turned out to be weirder than initially apparent. But you passed your exams, the stone is safe, and you made it to the end of term. First year is the hardest. You're going to be extraordinary at this. Enjoy the summer."},interstellar:{title:"Interstellar",year:"2014",emoji:"\u{1F30C}\u23F0\u{1F680}",bg:"#F0F9FF",border:"#0284C7",text:"#0C4A6E",tagline:"You've been playing the long game this week \u2014 thinking not just about what needs doing today but what it means for everything downstream. Cooper left Earth knowing he might not come back, because someone had to do it and nobody else was going to. That's a specific kind of weight to carry through a working week. You understand that some things matter beyond the immediate deadline. Stay the mission. The bookshelf will send a message when the time comes. Go and have a weekend that brings you back to the ground for a bit."},devilwearsprada:{title:"The Devil Wears Prada",year:"2006",emoji:"\u{1F460}\u{1F4BC}\u{1F4F0}",bg:"#F8F4F0",border:"#292524",text:"#1C1917",tagline:"This week had Miranda Priestly energy \u2014 high standards, no margin for error, demands arriving faster than they could be met, and a general sense that impressing the room was a full-time job on top of your actual full-time job. You learned the difference between the two cerulean belts. You got The Book delivered. You survived the Paris trip, metaphorically. The question is whether you're still Andy at the end of it, or whether the coat is starting to fit. Have a weekend that reminds you which one you are."},insideout:{title:"Inside Out",year:"2015",emoji:"\u{1F604}\u{1F622}\u{1F9E0}",bg:"#ECFDF5",border:"#059669",text:"#064E3B",tagline:"It was Joy and Sadness sharing the controls this week \u2014 both running at the same time, both making valid points, both occasionally crashing the console. Inside Out's whole point is that both are necessary, that the mixed feeling isn't a malfunction. Something this week touched a core memory, and you've been processing it. That's not weakness. That's how the islands work. Let the feelings do their job over the weekend. You'll find the right emotion is back in charge by Monday."},pursuitofhappyness:{title:"The Pursuit of Happyness",year:"2006",emoji:"\u{1F4BC}\u{1F3C3}\u200D\u2642\uFE0F\u2764\uFE0F",bg:"#FFF7ED",border:"#B45309",text:"#431A03",tagline:"You did not let go of the portable bone density scanner, metaphorically speaking. This week asked for more than any reasonable person would give \u2014 and you gave it anyway, because the story isn't over yet and you can see what it could become. Chris Gardner slept in a bathroom with his son and still showed up in a suit the next morning. You had your own version of that this week. Nobody in that board room knew what it took to sit in that chair. They're about to find out. Enjoy the weekend. You've more than earned it."},legallyblonde:{title:"Legally Blonde",year:"2001",emoji:"\u{1F485}\u{1F4DA}\u{1F338}",bg:"#FDF2F8",border:"#BE185D",text:"#831843",tagline:"Nobody expected you to walk into that courtroom and win the case. You did it anyway. This week you were Elle Woods \u2014 showing up fully and capably in a room that had already decided what you were before you opened your mouth, and proving them spectacularly, undeniably wrong. The bend-and-snap worked. The bend-and-snap always works. What, like it's hard? Go and enjoy your weekend knowing exactly who you are and what you're capable of. The law review article can wait until Monday."},frozen:{title:"Frozen",year:"2013",emoji:"\u2744\uFE0F\u{1F451}\u{1F31F}",bg:"#ECFEFF",border:"#0891B2",text:"#164E63",tagline:"Something thawed this week. A decision you'd been avoiding, a conversation you'd been putting off, a thing you'd kept locked away because it was easier \u2014 it came out into the open. And the world didn't end. That's the whole lesson of Frozen: the cold never bothered Elsa until she was trying to hide it. Once it was out, she built a palace. You've had your Let It Go moment this week. The kingdom didn't freeze over. Go and enjoy your weekend \u2014 the mountains are beautiful when you're not running from them."},thesocialnetwork:{title:"The Social Network",year:"2010",emoji:"\u{1F4BB}\u{1F4CA}\u{1F517}",bg:"#F1F5F9",border:"#475569",text:"#0F172A",tagline:"You've been in the zone this week \u2014 completely locked in on building something, moving fast, not pausing to second-guess. Mark Zuckerberg had exactly zero work-life balance in 2004 and look what he built. The depositions can come later. The relationship casualties are a problem for another time. Right now the product ships, the servers hold, and whatever you were building is real. Just remember to occasionally look up from the laptop and acknowledge the humans around you. Have a weekend. They'll still respect the genius on Monday."},topgunmaverick:{title:"Top Gun: Maverick",year:"2022",emoji:"\u2708\uFE0F\u{1F305}\u{1F3AF}",bg:"#EFF6FF",border:"#1E40AF",text:"#1E3A8A",tagline:"They told you that you were obsolete, that the window had passed, that it was time to hand the keys to the next generation. You flew through the canyon anyway. This week was a comeback week \u2014 doing the thing you were told couldn't be done, under conditions designed to prove you couldn't do it, and pulling up just in time. Maverick didn't fly the F-14 because it was sensible. He flew it because sometimes the mission requires the person who's already done the impossible once. You've got the need for speed. Enjoy the weekend, Mav."},goodwillhunting:{title:"Good Will Hunting",year:"1997",emoji:"\u{1F4D0}\u{1F9E0}\u{1F49A}",bg:"#F0FDF4",border:"#16A34A",text:"#14532D",tagline:"It's not your fault. This week asked something of you that went beyond the brief \u2014 not just the skills but the person behind them. Will Hunting could solve any problem on the chalkboard but the real work was letting someone see it. This week, something shifted. The therapy worked, in whatever form it took \u2014 a conversation, a moment, a thing you finally said or admitted or let through. The answer to the problem was on the board the whole time. You just had to be ready to write it. Go to California. Or wherever your California is. It's waiting."},eeaao:{title:"Everything Everywhere All at Once",year:"2022",emoji:"\u{1F300}\u{1F441}\uFE0F\u{1F4AB}",bg:"#FEF3FF",border:"#9333EA",text:"#581C87",tagline:"The tax audit was the least of your problems this week. Somewhere between the googly eyes and the everything bagel, you found something that made it all worthwhile \u2014 not because the chaos resolved, but because you chose to stay in it and connect. Evelyn Wang didn't win by becoming a better fighter. She won by choosing kindness in the middle of absolute everything. This week was a lot. All the universes were happening at once. And you showed up anyway, in this one, which is the one that matters. Go and rest. The laundromat will still be there."}},Cn=[{q:"One word that captures your week:",opts:[{label:"\u{1F32A}\uFE0F  Chaotic \u2014 fires, pivots, full-on",weights:{chaos:2,drive:0,emotion:0,team:0,pressure:1}},{label:"\u{1F3AF}  Focused \u2014 sharp and purposeful",weights:{chaos:0,drive:2,emotion:0,team:0,pressure:1}},{label:"\u{1F499}  Meaningful \u2014 it genuinely mattered",weights:{chaos:0,drive:0,emotion:2,team:1,pressure:0}},{label:"\u{1F33F}  Steady \u2014 consistent and grounded",weights:{chaos:0,drive:1,emotion:1,team:1,pressure:0}},{label:"\u{1F525}  Intense \u2014 high stakes throughout",weights:{chaos:1,drive:1,emotion:0,team:0,pressure:2}},{label:"\u{1F4AB}  Surprising \u2014 nothing landed how I expected",weights:{chaos:1,drive:0,emotion:2,team:0,pressure:0}},{label:"\u26A1  Relentless \u2014 absolutely no let-up all week",weights:{chaos:0,drive:2,emotion:0,team:0,pressure:2}}]},{q:"Your week was mainly...",opts:[{label:"\u26A1  Reacting and firefighting",weights:{chaos:2,drive:0,emotion:0,team:1,pressure:2}},{label:"\u{1F3D7}\uFE0F  Driving something forward",weights:{chaos:0,drive:2,emotion:0,team:1,pressure:1}},{label:"\u{1F91D}  Supporting and connecting people",weights:{chaos:0,drive:0,emotion:1,team:2,pressure:0}},{label:"\u{1F50D}  Deep in a complex problem",weights:{chaos:0,drive:1,emotion:0,team:0,pressure:1}},{label:"\u{1F3AD}  Winging it through unexpected twists",weights:{chaos:2,drive:1,emotion:0,team:0,pressure:1}},{label:"\u{1F3AF}  Executing \u2014 head down, making things happen",weights:{chaos:0,drive:2,emotion:0,team:0,pressure:1}},{label:"\u{1F4AD}  Absorbing \u2014 processing and feeling it all",weights:{chaos:0,drive:0,emotion:2,team:1,pressure:0}}]},{q:"Heading into Friday afternoon, you feel...",opts:[{label:"\u{1F4AA}  Energised \u2014 I'd go again",weights:{chaos:0,drive:2,emotion:1,team:0,pressure:1}},{label:"\u{1F62E}\u200D\u{1F4A8}  Relieved \u2014 I needed this",weights:{chaos:1,drive:0,emotion:0,team:0,pressure:2}},{label:"\u{1F499}  Emotional \u2014 this week genuinely moved me",weights:{chaos:0,drive:0,emotion:2,team:1,pressure:1}},{label:"\u{1F60C}  Content \u2014 solid week, no drama",weights:{chaos:0,drive:1,emotion:1,team:1,pressure:0}},{label:"\u{1F300}  Overwhelmed but somehow grateful",weights:{chaos:1,drive:0,emotion:2,team:0,pressure:1}},{label:"\u2728  Inspired \u2014 something clicked and it'll stick",weights:{chaos:0,drive:1,emotion:2,team:0,pressure:0}},{label:"\u{1F517}  Connected \u2014 I really felt the team this week",weights:{chaos:0,drive:0,emotion:1,team:2,pressure:0}}]},{q:"Your biggest contribution this week:",opts:[{label:"\u{1F9E0}  Spotted what nobody else did",weights:{chaos:0,drive:1,emotion:0,team:0,pressure:1}},{label:"\u{1F9F8}  Kept the team together",weights:{chaos:1,drive:0,emotion:1,team:2,pressure:1}},{label:"\u{1F4A5}  Survived something that shouldn't have worked",weights:{chaos:2,drive:0,emotion:2,team:0,pressure:2}},{label:"\u{1F3C3}  Just didn't stop going",weights:{chaos:0,drive:2,emotion:0,team:0,pressure:2}},{label:"\u{1F3A8}  Created something genuinely good",weights:{chaos:0,drive:2,emotion:2,team:0,pressure:0}},{label:"\u{1F932}  Showed up for someone who really needed it",weights:{chaos:0,drive:0,emotion:2,team:2,pressure:1}},{label:"\u{1F3C6}  Delivered something I'm genuinely proud of",weights:{chaos:0,drive:2,emotion:1,team:0,pressure:1}}]},{q:"How was the pressure?",opts:[{label:"\u{1F30B}  Extreme \u2014 survival mode",weights:{chaos:2,drive:0,emotion:0,team:0,pressure:2}},{label:"\u{1F4C8}  High but I was on top of it",weights:{chaos:0,drive:2,emotion:0,team:0,pressure:2}},{label:"\u{1F499}  Not work pressure \u2014 emotional weight",weights:{chaos:0,drive:0,emotion:2,team:0,pressure:1}},{label:"\u{1F30A}  Light \u2014 I had space to breathe",weights:{chaos:0,drive:0,emotion:1,team:1,pressure:0}},{label:"\u{1F3A2}  Unpredictable \u2014 calm then suddenly everything",weights:{chaos:2,drive:0,emotion:1,team:0,pressure:1}},{label:"\u{1F3B2}  Chaotic madness \u2014 but low actual stakes",weights:{chaos:2,drive:0,emotion:0,team:1,pressure:0}},{label:"\u{1F499}  Personal \u2014 more internal than external",weights:{chaos:0,drive:0,emotion:2,team:0,pressure:0}}]},{q:"Your team dynamic this week:",opts:[{label:"\u{1F9B8}  We all pulled together",weights:{chaos:1,drive:1,emotion:0,team:2,pressure:1}},{label:"\u{1F9BA}  I was their support system",weights:{chaos:0,drive:0,emotion:1,team:2,pressure:1}},{label:"\u{1F680}  I led the charge",weights:{chaos:0,drive:2,emotion:0,team:1,pressure:1}},{label:"\u{1F3DD}\uFE0F  Mostly solo, did my own thing",weights:{chaos:0,drive:1,emotion:0,team:0,pressure:1}},{label:"\u{1F300}  Coordinating the chaos was the whole job",weights:{chaos:2,drive:0,emotion:0,team:2,pressure:1}},{label:"\u{1F3AA}  Everyone scattered \u2014 pure every-man-for-himself",weights:{chaos:2,drive:0,emotion:0,team:0,pressure:0}},{label:"\u{1F31F}  In genuine flow \u2014 we just worked really well",weights:{chaos:0,drive:1,emotion:1,team:2,pressure:0}}]},{q:"Your weekend is looking...",opts:[{label:"\u{1F6CB}\uFE0F  Full shutdown \u2014 proper rest",weights:{chaos:0,drive:0,emotion:0,team:0,pressure:2}},{label:"\u{1F389}  Social \u2014 people, fun, energy",weights:{chaos:0,drive:0,emotion:1,team:2,pressure:0}},{label:"\u{1F33F}  Outdoors, movement, fresh air",weights:{chaos:0,drive:1,emotion:0,team:0,pressure:0}},{label:"\u{1F4AB}  Processing everything that happened",weights:{chaos:1,drive:0,emotion:2,team:0,pressure:0}},{label:"\u{1F3F4}\u200D\u2620\uFE0F  No plan \u2014 wherever it takes me",weights:{chaos:1,drive:0,emotion:0,team:1,pressure:0}},{label:"\u{1F3E1}  Quality time \u2014 people I actually want to see",weights:{chaos:0,drive:0,emotion:2,team:1,pressure:0}},{label:"\u{1F9D7}  Active \u2014 I need to push myself physically",weights:{chaos:0,drive:2,emotion:0,team:0,pressure:1}}]}],_e=[{q:"The Claude desktop app has three distinct modes: Chat, Cowork, and Code.",answer:!0,explanation:"Chat is the familiar conversation window. Cowork is an agentic working session where Claude plans and executes tasks with your files. Code (Claude Code) edits actual files in your folders \u2014 not a sandbox."},{q:"In Cowork mode, Claude can work with files already open on your computer without you copy-pasting anything.",answer:!0,explanation:"That's exactly what sets Cowork apart from Chat. With your permission, it reads your open apps and files directly \u2014 no more copy-pasting content back and forth to get help on something you're already looking at."},{q:"Files uploaded to a Claude Project are available in every conversation within that Project, automatically.",answer:!0,explanation:"Projects act as persistent context containers. Upload your company handbook, a brief, or a dataset once \u2014 every conversation in that Project has it. No re-uploading, no re-explaining."},{q:"Artifacts in Claude are essentially just another word for text responses \u2014 they don't do anything more than display content.",answer:!1,explanation:"Artifacts are much more than static text. They're editable outputs with version history, shareable via link, and can run live code \u2014 including interactive apps \u2014 directly in the chat window. Think Google Docs with an AI collaborator built in."},{q:"Cowork and Chat are essentially the same thing \u2014 just two names for talking to Claude.",answer:!1,explanation:"Chat is a conversation: you ask, Claude responds. Cowork is a working session: you describe a task, Claude plans it out, executes the steps, and you steer the work. It's agentic, multi-step, and works with your actual files on your machine."},{q:"Claude Connectors \u2014 which link Claude to apps like Slack, Gmail, and Google Drive \u2014 are built on an open standard called MCP.",answer:!0,explanation:"MCP (Model Context Protocol) is Anthropic's open standard for connecting AI to external tools and data sources. Connectors are the consumer-facing implementation \u2014 one setup flow to give Claude access to the tools you already use."},{q:"A prompting pattern from Claude 101: specifying Role, Task, Context, and Format consistently produces better results.",answer:!0,explanation:"Not advanced prompt engineering \u2014 just a reliable habit. Role = who Claude should be. Task = what you need done. Context = the relevant background. Format = how you want the output structured. Four inputs, noticeably better outputs."},{q:"Claude's Research Mode works like a regular web search \u2014 it returns results in a few seconds and gives you links to go and read yourself.",answer:!1,explanation:"Research Mode is more like sending Claude off to do the reading for you. It autonomously browses multiple sources, reads them in depth, and synthesises everything into a structured report with citations \u2014 a process that can take several minutes. The result is finished analysis, not a list of links."},{q:"Claude Skills and Connectors \u2014 reusable instruction bundles and app integrations \u2014 are both available on the free Claude plan.",answer:!1,explanation:"Projects and Artifacts work on the free plan. Skills (custom instruction bundles) and Connectors (integrations with Gmail, Slack, Drive etc.) require a Pro subscription or above. Worth knowing when deciding which plan your team needs."},{q:"MCP \u2014 the open standard that powers Claude Connectors \u2014 was designed by Anthropic exclusively for Claude and can only be used by Claude-based AI systems.",answer:!1,explanation:"MCP (Model Context Protocol) is open source, published by Anthropic but deliberately designed as an industry-wide standard. Any AI system can implement it. The idea is a common language for AI assistants to connect to tools \u2014 not a Claude-only protocol."}],If=["chaos","drive","emotion","team","pressure"];function o1(t){let e={chaos:{lo:1,hi:7},drive:{lo:1,hi:8},emotion:{lo:2,hi:9},team:{lo:1,hi:7},pressure:{lo:3,hi:9}},l={};If.forEach(u=>{let{lo:i,hi:c}=e[u];l[u]=Math.max(0,Math.min(10,(t[u]-i)/(c-i)
